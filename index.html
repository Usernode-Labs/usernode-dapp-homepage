<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Usernode dapps</title>
    <script>
    // Apply the persisted (or system-preferred) theme before first paint to
    // avoid a flash of the wrong theme. Mirrors Tailwind's class strategy:
    // a `dark` class on <html> selects the dark CSS-variable set.
    (function () {
      try {
        var stored = localStorage.getItem('dapphome:theme');
        var dark = stored
          ? stored === 'dark'
          : window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      } catch (_) {}
    })();
    </script>
    <script>
    // usernode-dev-console@1
    (function () {
      if (window.__usernodeDevConsole) return;
      window.__usernodeDevConsole = true;
      var S = '__usernodeDevConsole';
      function serialize(v, depth) {
        depth = depth || 0;
        try {
          if (v === undefined) return 'undefined';
          if (v === null) return 'null';
          if (typeof v === 'string') return v;
          if (typeof v === 'number' || typeof v === 'boolean') return String(v);
          if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
          if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
          if (depth > 3) return '[…]';
          var seen = new WeakSet();
          return JSON.stringify(v, function (k, val) {
            if (typeof val === 'object' && val !== null) {
              if (seen.has(val)) return '[Circular]';
              seen.add(val);
            }
            if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
            if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
            return val;
          });
        } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
      }
      function post(level, args, meta) {
        try {
          var payload = {
            sentinel: S,
            level: level,
            args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
            ts: Date.now(),
            url: location.href,
          };
          if (meta) for (var k in meta) payload[k] = meta[k];
          if (window.parent && window.parent !== window) {
            window.parent.postMessage(payload, '*');
          }
        } catch (_) {}
      }
      ['log','info','warn','error','debug'].forEach(function (level) {
        var orig = console[level] ? console[level].bind(console) : function () {};
        console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
      });
      window.addEventListener('error', function (e) {
        var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
        post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason;
        var msg = (r && (r.stack || r.message)) || String(r);
        post('error', [msg], { kind: 'unhandledrejection' });
      });
      try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
    })();
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --fg: #0b1220;
        --muted: #4b5568;
        --card: #ffffff;
        --border: rgba(15, 23, 42, 0.12);
        --card-item-border: rgba(15, 23, 42, 0.07);
        --card-item-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        --accent: #2563eb;
        --launch-btn: #7c3aed;
        --card-hover-border: rgba(99, 102, 241, 0.45);
        --grid-opacity: 0.04;
      }
      /* Class strategy (Tailwind-style): a `dark` class on <html> selects the
         dark palette. The default theme is chosen at load time from
         localStorage, falling back to the system preference. */
      html.dark {
        color-scheme: dark;
        --bg: #0b0f16;
        --fg: #e7edf7;
        --muted: #a8b3c7;
        --card: #141b26;
        --border: rgba(255, 255, 255, 0.12);
        --card-item-border: rgba(255, 255, 255, 0.07);
        --card-item-shadow: 0 1px 6px rgba(0, 0, 0, 0.28);
        --accent: #6ea8fe;
        --launch-btn: #8b5cf6;
        --card-hover-border: rgba(139, 92, 246, 0.6);
        --grid-opacity: 0.06;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background-color: var(--bg);
        background-image:
          repeating-linear-gradient(rgba(100, 100, 120, var(--grid-opacity)) 1px, transparent 1px),
          repeating-linear-gradient(90deg, rgba(100, 100, 120, var(--grid-opacity)) 1px, transparent 1px);
        background-size: 36px 36px;
        color: var(--fg);
        height: 100vh;
        height: 100dvh;
      }
      main {
        height: 100vh;
        height: 100dvh;
        display: flex;
        justify-content: flex-start;
        align-items: stretch;
        padding: 16px;
        box-sizing: border-box;
      }
      .card {
        width: 100%;
        max-width: 820px;
        margin: 0 auto;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        height: 100%;
        min-height: 0;
      }
      .header {
        padding: 18px 18px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--card);
        flex: 0 0 auto;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .headerRow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      /* Brand lockup: Usernode logo mark + wordmark, linking back to the
         Usernode homepage, sitting left of the "Dapps" section title. Colors
         come from the shared theme variables so it recolors in light/dark. */
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .brandLink {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: inherit;
        text-decoration: none;
        flex: 0 0 auto;
      }
      .brandLink:hover .brandName {
        color: var(--accent);
      }
      .brandMark {
        width: 22px;
        height: 22px;
        display: block;
        color: var(--accent);
        flex: 0 0 auto;
      }
      .brandName {
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.2px;
        color: var(--fg);
        white-space: nowrap;
      }
      .brandSep {
        width: 1px;
        height: 18px;
        background: var(--border);
        flex: 0 0 auto;
      }
      /* On very narrow screens drop the wordmark (keep the icon) so the brand
         never pushes the theme + sort controls off the header row. */
      @media (max-width: 420px) {
        .brandName {
          display: none;
        }
      }
      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      p {
        margin: 10px 0;
        color: var(--muted);
        line-height: 1.45;
      }
      .headerActions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
      }
      .themeBtn {
        appearance: none;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        padding: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }
      .themeBtn:hover {
        color: var(--fg);
        border-color: var(--accent);
      }
      .themeBtn svg {
        width: 16px;
        height: 16px;
        display: block;
      }
      /* Show the sun in dark mode (click → go light) and the moon in light
         mode (click → go dark). */
      .themeBtn .iconSun {
        display: none;
      }
      html.dark .themeBtn .iconSun {
        display: block;
      }
      html.dark .themeBtn .iconMoon {
        display: none;
      }
      .sortWrap {
        position: relative;
        flex: 0 0 auto;
      }
      .sortBtn {
        appearance: none;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        font-size: 13px;
        padding: 6px 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
        font-family: inherit;
      }
      .sortBtn:hover {
        color: var(--fg);
        border-color: var(--accent);
      }
      .sortBtn svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }
      .sortMenu {
        display: none;
        position: absolute;
        top: calc(100% + 4px);
        right: 0;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        z-index: 100;
        min-width: 180px;
        padding: 4px;
        overflow: hidden;
      }
      .sortMenu.open {
        display: block;
      }
      .sortOpt {
        display: block;
        width: 100%;
        padding: 8px 12px;
        border: none;
        background: transparent;
        color: var(--fg);
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        border-radius: 6px;
        font-family: inherit;
      }
      .sortOpt:hover {
        background: var(--border);
      }
      .sortOpt.active {
        color: var(--accent);
        font-weight: 600;
      }
      ul {
        list-style: none;
        padding: 12px 12px 14px;
        margin: 0;
        display: grid;
        gap: 10px;
        will-change: transform;
        touch-action: none;
        flex: 1 1 auto;
        min-height: 0;
        align-content: start;
        grid-auto-rows: max-content;
      }
      li {
        border: 1px solid var(--card-item-border);
        box-shadow: var(--card-item-shadow);
        border-radius: 12px;
        padding: 0;
        overflow: hidden;
        transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
        will-change: transform;
      }
      li:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(99, 102, 241, 0.18);
        border-color: var(--card-hover-border);
      }
      li.is-pressed {
        transform: translateY(0px);
        box-shadow: none;
        border-color: var(--card-hover-border);
        transition-duration: 80ms;
      }
      .dappLink {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 12px;
        color: inherit;
        text-decoration: none;
        touch-action: none;
      }
      .dappLink:hover {
        text-decoration: none;
      }
      .dappLink:active {
        filter: brightness(0.98);
      }
      /* Per-dapp leading mark. Either a provided logo (image URL or inline
         SVG from dapps.json) or a generated fallback badge. Sized to span the
         row's text block; theme-aware via the shared CSS variables. */
      .dappBody {
        display: grid;
        gap: 4px;
        flex: 1 1 auto;
        min-width: 0;
      }
      .dappLogo,
      .dappLogoFallback {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        flex: 0 0 auto;
        border: 1px solid var(--border);
        box-sizing: border-box;
        overflow: hidden;
      }
      .dappLogo {
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
      }
      .dappLogo img,
      .dappLogo svg {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .dappLogoFallback {
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
        line-height: 1;
        color: #ffffff;
        text-transform: uppercase;
        user-select: none;
      }
      .nameRow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0;
      }
      .name {
        font-weight: 600;
        min-width: 0;
      }
      .stats {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
        font-size: 13px;
        color: var(--muted);
      }
      .stat {
        display: flex;
        align-items: center;
        gap: 3px;
        white-space: nowrap;
      }
      .stat svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        opacity: 0.7;
      }
      .statsLoading {
        font-size: 12px;
        color: var(--muted);
        opacity: 0.5;
      }
      .author {
        color: var(--muted);
        font-size: 12px;
        opacity: 0.75;
      }
      .descRow {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }
      .desc {
        color: var(--muted);
        font-size: 13px;
        flex: 1 1 auto;
        min-width: 0;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .launchBtn {
        flex: 0 0 auto;
        font-size: 12px;
        font-weight: 600;
        font-family: inherit;
        padding: 4px 10px;
        border-radius: 6px;
        background: linear-gradient(135deg, #6d28d9, #9333ea);
        color: #ffffff;
        box-shadow: 0 0 8px rgba(124, 58, 237, 0.35);
        transition: filter 0.2s ease, box-shadow 0.2s ease;
      }
      .dappLink:hover .launchBtn {
        filter: brightness(1.15);
        box-shadow: 0 0 14px rgba(124, 58, 237, 0.55);
      }
      html.dark .launchBtn {
        background: linear-gradient(135deg, #7c3aed, #c084fc);
        box-shadow: 0 0 12px rgba(167, 139, 250, 0.55);
      }
      html.dark .dappLink:hover .launchBtn {
        filter: brightness(1.12);
        box-shadow: 0 0 18px rgba(167, 139, 250, 0.75);
      }
      .tagRow {
        display: flex;
        align-items: center;
        margin-top: 4px;
        gap: 6px;
      }
      .categoryTag {
        font-size: 11px;
        font-weight: 600;
        padding: 2px 7px;
        border-radius: 999px;
        display: inline-block;
      }
      /* Live status dot */
      .liveDot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #22c55e;
        flex-shrink: 0;
        position: relative;
        margin-right: 6px;
      }
      @media (prefers-reduced-motion: no-preference) {
        @keyframes livePing {
          0% { transform: scale(1); opacity: 0.6; }
          100% { transform: scale(2); opacity: 0; }
        }
        .liveDot::after {
          content: '';
          position: absolute;
          inset: 0;
          border-radius: 50%;
          background: #22c55e;
          animation: livePing 2s ease-out infinite;
        }
      }

      /* ── Preview modal ──────────────────────────────────────────────
         A single reusable overlay populated on open. Uses the shared
         theme variables so it recolors in light/dark for free. */
      .previewOverlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
        background: rgba(8, 12, 20, 0.55);
        backdrop-filter: blur(2px);
      }
      .previewOverlay.open {
        display: flex;
      }
      @media (prefers-reduced-motion: no-preference) {
        @keyframes previewIn {
          from { opacity: 0; transform: translateY(8px) scale(0.985); }
          to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .previewOverlay.open .previewPanel {
          animation: previewIn 160ms ease-out;
        }
      }
      .previewPanel {
        background: var(--card);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
        width: 100%;
        max-width: 560px;
        max-height: calc(100dvh - 40px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .previewHeader {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 16px 16px 12px;
        border-bottom: 1px solid var(--border);
        flex: 0 0 auto;
      }
      .previewHeadText {
        flex: 1 1 auto;
        min-width: 0;
        display: grid;
        gap: 6px;
      }
      .previewName {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.2px;
        line-height: 1.2;
        word-break: break-word;
      }
      .previewClose {
        appearance: none;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        width: 30px;
        height: 30px;
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .previewClose:hover {
        color: var(--fg);
        border-color: var(--accent);
      }
      .previewBody {
        padding: 14px 16px 16px;
        overflow-y: auto;
        flex: 1 1 auto;
        min-height: 0;
        display: grid;
        gap: 14px;
      }
      .previewMeta {
        display: grid;
        gap: 6px;
        font-size: 13px;
      }
      .previewMetaRow {
        display: flex;
        gap: 8px;
        align-items: baseline;
      }
      .previewMetaLabel {
        color: var(--muted);
        flex: 0 0 auto;
        min-width: 92px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .previewMetaVal {
        color: var(--fg);
        min-width: 0;
        word-break: break-word;
      }
      .previewMetaVal a {
        color: var(--accent);
        text-decoration: none;
      }
      .previewMetaVal a:hover {
        text-decoration: underline;
      }
      .previewDesc {
        color: var(--fg);
        font-size: 14px;
        line-height: 1.55;
        white-space: pre-wrap;
      }
      .previewStats {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 13px;
        color: var(--muted);
      }
      .previewStats .stat svg {
        width: 14px;
        height: 14px;
        opacity: 0.7;
      }
      .previewFooter {
        padding: 12px 16px 16px;
        border-top: 1px solid var(--border);
        flex: 0 0 auto;
        display: flex;
        justify-content: flex-end;
      }
      .previewLaunch {
        appearance: none;
        border: none;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        padding: 9px 18px;
        border-radius: 8px;
        cursor: pointer;
        color: #ffffff;
        background: linear-gradient(135deg, #6d28d9, #9333ea);
        box-shadow: 0 0 10px rgba(124, 58, 237, 0.35);
        transition: filter 0.2s ease, box-shadow 0.2s ease;
      }
      .previewLaunch:hover {
        filter: brightness(1.12);
        box-shadow: 0 0 16px rgba(124, 58, 237, 0.55);
      }
      html.dark .previewLaunch {
        background: linear-gradient(135deg, #7c3aed, #c084fc);
        box-shadow: 0 0 12px rgba(167, 139, 250, 0.55);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="header">
          <div class="headerRow">
            <div class="brand">
              <a class="brandLink" href="https://usernode.evanshapiro.dev" target="_blank" rel="noopener" aria-label="Usernode home">
                <svg class="brandMark" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <rect x="2" y="2" width="20" height="20" rx="6" fill="currentColor" />
                  <path d="M8 7v5.2a4 4 0 0 0 8 0V7" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" />
                </svg>
                <span class="brandName">DAPPS</span>
              </a>
            </div>
            <div class="headerActions">
            <button class="themeBtn" id="themeBtn" type="button" aria-label="Toggle theme" title="Toggle theme">
              <svg class="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              <svg class="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            </button>
            <div class="sortWrap">
              <button class="sortBtn" id="sortBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M6 12h12M9 18h6"/></svg>
                <span id="sortLabel">Popular</span>
              </button>
              <div class="sortMenu" id="sortMenu">
                <button class="sortOpt" data-sort="popular">Popular</button>
                <button class="sortOpt" data-sort="users">Most users</button>
                <button class="sortOpt" data-sort="txns">Most transactions</button>
                <button class="sortOpt" data-sort="alpha">Alphabetical</button>
              </div>
            </div>
            </div>
          </div>
        </div>
        <ul id="dappList"></ul>
      </div>
    </main>
    <div
      class="previewOverlay"
      id="previewOverlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="previewName"
      aria-hidden="true"
    >
      <div class="previewPanel" id="previewPanel">
        <div class="previewHeader">
          <div class="previewLogo" id="previewLogo"></div>
          <div class="previewHeadText">
            <div class="previewName" id="previewName"></div>
            <div class="tagRow" id="previewTagRow" style="margin-top:0"></div>
          </div>
          <button
            class="previewClose"
            id="previewClose"
            type="button"
            aria-label="Close preview"
            title="Close"
          >&times;</button>
        </div>
        <div class="previewBody">
          <div class="previewMeta" id="previewMeta"></div>
          <div class="previewDesc" id="previewDesc"></div>
        </div>
        <div class="previewFooter">
          <button class="previewLaunch" id="previewLaunch" type="button">Launch</button>
        </div>
      </div>
    </div>
    <script>
      const SORT_KEY = "dapphome:sort";
      const THEME_KEY = "dapphome:theme";
      const PERSON_WEIGHT = 20;
      const CATEGORY_COLORS = {
        Game:    '#10b981',
        Market:  '#f59e0b',
        Utility: '#38bdf8',
        Social:  '#f43f5e',
      };

      const list = document.getElementById("dappList");
      const sortBtn = document.getElementById("sortBtn");
      const sortMenu = document.getElementById("sortMenu");
      const sortLabel = document.getElementById("sortLabel");
      const themeBtn = document.getElementById("themeBtn");

      // Theme toggle. The initial class is applied pre-paint in <head>; here we
      // just flip it and persist the explicit choice to localStorage.
      function applyTheme(theme) {
        document.documentElement.classList.toggle("dark", theme === "dark");
        if (themeBtn) {
          const isDark = theme === "dark";
          themeBtn.setAttribute(
            "aria-label",
            isDark ? "Switch to light theme" : "Switch to dark theme"
          );
          themeBtn.setAttribute("title", themeBtn.getAttribute("aria-label"));
        }
      }
      applyTheme(
        document.documentElement.classList.contains("dark") ? "dark" : "light"
      );
      if (themeBtn) {
        themeBtn.addEventListener("click", () => {
          const next = document.documentElement.classList.contains("dark")
            ? "light"
            : "dark";
          localStorage.setItem(THEME_KEY, next);
          applyTheme(next);
        });
      }

      let allApps = [];
      let statsMap = {};
      let currentSort = localStorage.getItem(SORT_KEY) || "popular";

      const SORT_LABELS = {
        popular: "Popular",
        users: "Most users",
        txns: "Most transactions",
        alpha: "Alphabetical",
      };

      function clearList() {
        if (!list) return;
        list.textContent = "";
      }

      function addRow(text) {
        if (!list) return;
        const li = document.createElement("li");
        li.style.padding = "12px 12px";
        li.style.color = "var(--muted)";
        li.textContent = text;
        list.appendChild(li);
      }

      function personIcon() {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 24 24");
        svg.setAttribute("fill", "none");
        svg.setAttribute("stroke", "currentColor");
        svg.setAttribute("stroke-width", "2");
        svg.setAttribute("stroke-linecap", "round");
        svg.setAttribute("stroke-linejoin", "round");
        svg.innerHTML = '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>';
        return svg;
      }

      function txIcon() {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 24 24");
        svg.setAttribute("fill", "none");
        svg.setAttribute("stroke", "currentColor");
        svg.setAttribute("stroke-width", "2");
        svg.setAttribute("stroke-linecap", "round");
        svg.setAttribute("stroke-linejoin", "round");
        svg.innerHTML = '<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>';
        return svg;
      }

      // Deterministic hue from a dapp name so the same dapp always gets the
      // same fallback badge color across reloads/sorts.
      function hashString(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) {
          h = (h * 31 + str.charCodeAt(i)) | 0;
        }
        return Math.abs(h);
      }

      function fallbackColor(name) {
        const hue = hashString(name || "") % 360;
        return `hsl(${hue}, 55%, 45%)`;
      }

      function fallbackBadge(dapp) {
        const name = (dapp.name || "").trim();
        const badge = document.createElement("div");
        badge.className = "dappLogoFallback";
        badge.style.background = fallbackColor(name || "?");
        badge.textContent = (name[0] || "?").toUpperCase();
        badge.setAttribute("aria-hidden", "true");
        return badge;
      }

      // Build the row's leading mark. `dapp.logo` may be an image URL or an
      // inline-SVG string; anything else (or a broken image) falls back to a
      // generated initial badge so every row shows something.
      function makeLogo(dapp) {
        const raw = typeof dapp.logo === "string" ? dapp.logo.trim() : "";
        if (raw.startsWith("<svg")) {
          const wrap = document.createElement("div");
          wrap.className = "dappLogo";
          wrap.innerHTML = raw;
          wrap.setAttribute("aria-hidden", "true");
          return wrap;
        }
        if (raw) {
          const wrap = document.createElement("div");
          wrap.className = "dappLogo";
          const img = document.createElement("img");
          img.src = raw;
          img.alt = "";
          img.loading = "lazy";
          img.addEventListener("error", () => {
            wrap.replaceWith(fallbackBadge(dapp));
          });
          wrap.appendChild(img);
          return wrap;
        }
        return fallbackBadge(dapp);
      }

      function formatNum(n) {
        if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, "") + "M";
        if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "k";
        return String(n);
      }

      function sortApps(apps) {
        const sorted = apps.slice();
        sorted.sort((a, b) => {
          const sa = statsMap[a.pubkey] || { users: 0, txns: 0 };
          const sb = statsMap[b.pubkey] || { users: 0, txns: 0 };
          switch (currentSort) {
            case "alpha":
              return (a.name || "").localeCompare(b.name || "");
            case "users":
              return sb.users - sa.users || sb.txns - sa.txns;
            case "txns":
              return sb.txns - sa.txns || sb.users - sa.users;
            case "popular":
            default:
              return (sb.users * PERSON_WEIGHT + sb.txns) - (sa.users * PERSON_WEIGHT + sa.txns);
          }
        });
        return sorted;
      }

      function renderDapps(dapps) {
        if (!list) return;
        clearList();

        if (!Array.isArray(dapps) || dapps.length === 0) {
          addRow("(no dapps configured)");
          return;
        }

        const sorted = sortApps(dapps);

        for (const dapp of sorted) {
          const li = document.createElement("li");

          const link = document.createElement("a");
          link.className = "dappLink";
          link.href = dapp.url;
          link.target = "_blank";
          link.rel = "noopener";
          // Left-tap / Enter on the card body opens the preview panel; the
          // Launch button (below) is the only part that launches the dapp.
          link.setAttribute("aria-label", `Preview ${dapp.name || "dapp"}`);
          link.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " " || e.key === "Spacebar") {
              e.preventDefault();
              openPreview(dapp, li);
            }
          });

          const logo = makeLogo(dapp);

          const body = document.createElement("div");
          body.className = "dappBody";

          const nameRow = document.createElement("div");
          nameRow.className = "nameRow";

          // Wrap dot + name together so space-between only separates them from stats
          const nameGroup = document.createElement("div");
          nameGroup.style.cssText = "display:flex;align-items:center;min-width:0;flex:1 1 auto";

          const liveDot = document.createElement("span");
          liveDot.className = "liveDot";
          nameGroup.appendChild(liveDot);

          const name = document.createElement("div");
          name.className = "name";
          name.textContent = dapp.name || "(unnamed)";
          nameGroup.appendChild(name);

          nameRow.appendChild(nameGroup);

          if (dapp.pubkey) {
            const s = statsMap[dapp.pubkey];
            const statsEl = document.createElement("div");
            statsEl.className = "stats";

            if (s) {
              const userStat = document.createElement("span");
              userStat.className = "stat";
              userStat.appendChild(personIcon());
              userStat.appendChild(document.createTextNode(formatNum(s.users)));

              const txStat = document.createElement("span");
              txStat.className = "stat";
              txStat.appendChild(txIcon());
              txStat.appendChild(document.createTextNode(formatNum(s.txns)));

              statsEl.appendChild(userStat);
              statsEl.appendChild(txStat);
            } else {
              const loading = document.createElement("span");
              loading.className = "statsLoading";
              loading.textContent = "loading...";
              statsEl.appendChild(loading);
            }

            nameRow.appendChild(statsEl);
          }

          const author = document.createElement("div");
          author.className = "author";
          author.textContent = `by ${dapp.author || "unknown"}`;

          let tagRow = null;
          if (dapp.category) {
            tagRow = document.createElement("div");
            tagRow.className = "tagRow";
            const tag = document.createElement("span");
            tag.className = "categoryTag";
            tag.textContent = dapp.category;
            const color = CATEGORY_COLORS[dapp.category];
            if (color) {
              tag.style.color = color;
              tag.style.background = color + "33";
              tag.style.border = "1px solid " + color + "66";
            } else {
              tag.style.color = "var(--muted)";
              tag.style.border = "1px solid var(--border)";
            }
            tagRow.appendChild(tag);
          }

          const descRow = document.createElement("div");
          descRow.className = "descRow";

          const desc = document.createElement("span");
          desc.className = "desc";
          desc.textContent = dapp.description || "";

          const launchBtn = document.createElement("span");
          launchBtn.className = "launchBtn";
          launchBtn.textContent = "Launch";
          launchBtn.setAttribute("role", "button");
          launchBtn.setAttribute("tabindex", "0");
          launchBtn.setAttribute("aria-label", `Launch ${dapp.name || "dapp"}`);
          launchBtn.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " " || e.key === "Spacebar") {
              e.preventDefault();
              e.stopPropagation();
              launchDapp(dapp);
            }
          });

          descRow.appendChild(desc);
          descRow.appendChild(launchBtn);

          body.appendChild(nameRow);
          body.appendChild(author);
          if (tagRow) body.appendChild(tagRow);
          body.appendChild(descRow);

          link.appendChild(logo);
          link.appendChild(body);
          li.appendChild(link);
          li.__dapp = dapp;
          list.appendChild(li);
        }
      }

      async function loadDappsJson() {
        const resp = await fetch("./dapps.json", { cache: "no-store" });
        if (!resp.ok) {
          throw new Error(`Failed to load dapps.json: HTTP ${resp.status}`);
        }
        return await resp.json();
      }

      async function loadAllStats(apps) {
        try {
          const resp = await fetch("/api/stats");
          if (!resp.ok) throw new Error(`Stats API ${resp.status}`);
          const data = await resp.json();
          for (const [pk, s] of Object.entries(data)) {
            statsMap[pk] = s;
          }
          renderDapps(allApps);
        } catch (e) {
          console.warn("Could not load stats:", e);
        }
      }

      // --- Sort menu ---
      function updateSortUI() {
        sortLabel.textContent = SORT_LABELS[currentSort] || "Popular";
        sortMenu.querySelectorAll(".sortOpt").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.sort === currentSort);
        });
      }

      sortBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        sortMenu.classList.toggle("open");
      });

      sortMenu.addEventListener("click", (e) => {
        const opt = e.target.closest(".sortOpt");
        if (!opt) return;
        currentSort = opt.dataset.sort;
        localStorage.setItem(SORT_KEY, currentSort);
        updateSortUI();
        renderDapps(allApps);
        sortMenu.classList.remove("open");
      });

      document.addEventListener("click", () => {
        sortMenu.classList.remove("open");
      });

      updateSortUI();

      (async function main() {
        addRow("(loading dapps...)");
        try {
          const json = await loadDappsJson();
          allApps = Array.isArray(json) ? json : json.apps || json.items || [];
          renderDapps(allApps);
          loadAllStats(allApps);
        } catch (e) {
          clearList();
          addRow(
            `(error loading dapps.json: ${e && e.message ? e.message : String(e)})`
          );
        }
      })();

      // ── Preview modal ─────────────────────────────────────────────
      const previewOverlay = document.getElementById("previewOverlay");
      const previewPanel = document.getElementById("previewPanel");
      const previewLogo = document.getElementById("previewLogo");
      const previewNameEl = document.getElementById("previewName");
      const previewTagRow = document.getElementById("previewTagRow");
      const previewMeta = document.getElementById("previewMeta");
      const previewDesc = document.getElementById("previewDesc");
      const previewLaunchBtn = document.getElementById("previewLaunch");
      const previewCloseBtn = document.getElementById("previewClose");

      let previewCurrentDapp = null;
      let previewReturnFocus = null;

      function launchDapp(dapp) {
        if (dapp && dapp.url) window.open(dapp.url, "_blank", "noopener");
      }

      // Format an ISO-ish date string into a friendly "Last updated" value.
      // Falls back to the raw string when it can't be parsed; null when empty.
      function formatUpdated(raw) {
        if (typeof raw !== "string" || !raw.trim()) return null;
        const d = new Date(raw);
        if (isNaN(d.getTime())) return raw;
        try {
          return d.toLocaleDateString(undefined, {
            year: "numeric",
            month: "long",
            day: "numeric",
          });
        } catch (_) {
          return raw;
        }
      }

      function metaRow(label, value) {
        const row = document.createElement("div");
        row.className = "previewMetaRow";
        const l = document.createElement("div");
        l.className = "previewMetaLabel";
        l.textContent = label;
        const v = document.createElement("div");
        v.className = "previewMetaVal";
        if (typeof value === "string") v.textContent = value;
        else v.appendChild(value);
        row.appendChild(l);
        row.appendChild(v);
        return row;
      }

      function buildPreviewMeta(dapp) {
        previewMeta.textContent = "";

        const author = dapp.author || "unknown";
        let devNode;
        if (dapp.developerUrl) {
          const a = document.createElement("a");
          a.href = dapp.developerUrl;
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = author;
          devNode = a;
        } else {
          devNode = author;
        }
        previewMeta.appendChild(metaRow("Developer", devNode));

        if (dapp.version)
          previewMeta.appendChild(metaRow("Version", String(dapp.version)));

        const updated = formatUpdated(dapp.updated);
        if (updated) previewMeta.appendChild(metaRow("Last updated", updated));

        const s = dapp.pubkey ? statsMap[dapp.pubkey] : null;
        if (s) {
          const wrap = document.createElement("div");
          wrap.className = "previewStats";
          const u = document.createElement("span");
          u.className = "stat";
          u.appendChild(personIcon());
          u.appendChild(document.createTextNode(formatNum(s.users)));
          const t = document.createElement("span");
          t.className = "stat";
          t.appendChild(txIcon());
          t.appendChild(document.createTextNode(formatNum(s.txns)));
          wrap.appendChild(u);
          wrap.appendChild(t);
          previewMeta.appendChild(metaRow("Activity", wrap));
        }
      }

      function buildPreviewTag(dapp) {
        previewTagRow.textContent = "";
        if (!dapp.category) {
          previewTagRow.hidden = true;
          return;
        }
        previewTagRow.hidden = false;
        const tag = document.createElement("span");
        tag.className = "categoryTag";
        tag.textContent = dapp.category;
        const color = CATEGORY_COLORS[dapp.category];
        if (color) {
          tag.style.color = color;
          tag.style.background = color + "33";
          tag.style.border = "1px solid " + color + "66";
        } else {
          tag.style.color = "var(--muted)";
          tag.style.border = "1px solid var(--border)";
        }
        previewTagRow.appendChild(tag);
      }

      function openPreview(dapp, originEl) {
        if (!dapp) return;
        previewCurrentDapp = dapp;
        // Return focus to the card's link on close (the <li> itself isn't
        // focusable; the inner .dappLink anchor is).
        previewReturnFocus =
          (originEl &&
            originEl.querySelector &&
            originEl.querySelector(".dappLink")) ||
          originEl ||
          document.activeElement;

        previewNameEl.textContent = dapp.name || "(unnamed)";

        previewLogo.textContent = "";
        previewLogo.appendChild(makeLogo(dapp));

        buildPreviewTag(dapp);
        buildPreviewMeta(dapp);

        // Plain text only — never inject untrusted strings as HTML.
        previewDesc.textContent = dapp.longDescription || dapp.description || "";

        previewOverlay.classList.add("open");
        previewOverlay.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";

        previewCloseBtn.focus();
      }

      function closePreview() {
        if (!previewOverlay.classList.contains("open")) return;
        previewOverlay.classList.remove("open");
        previewOverlay.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
        previewCurrentDapp = null;
        const ret = previewReturnFocus;
        previewReturnFocus = null;
        if (ret && typeof ret.focus === "function") {
          try {
            ret.focus();
          } catch (_) {}
        }
      }

      previewCloseBtn.addEventListener("click", closePreview);
      previewLaunchBtn.addEventListener("click", () => {
        launchDapp(previewCurrentDapp);
      });
      previewOverlay.addEventListener("click", (e) => {
        if (e.target === previewOverlay) closePreview();
      });
      document.addEventListener("keydown", (e) => {
        if (!previewOverlay.classList.contains("open")) return;
        if (e.key === "Escape") {
          e.preventDefault();
          closePreview();
          return;
        }
        if (e.key === "Tab") {
          const focusables = previewPanel.querySelectorAll(
            'a[href], button, [tabindex]:not([tabindex="-1"])'
          );
          const visible = Array.prototype.filter.call(
            focusables,
            (el) => !el.disabled && el.tabIndex !== -1 && el.offsetParent !== null
          );
          if (visible.length === 0) return;
          const first = visible[0];
          const last = visible[visible.length - 1];
          if (e.shiftKey && document.activeElement === first) {
            e.preventDefault();
            last.focus();
          } else if (!e.shiftKey && document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
      });

      // --- Rubber-band (overscroll-like) stretch config ---
      const RUBBER_BAND = {
        deadzonePx: 6,
        maxPullPx: 92,
        constant: 0.56,
        snapMs: 210,
        snapEasing: "cubic-bezier(0.2, 0.9, 0.2, 1)",
        enableScaleY: true,
        scaleDivisor: 850,
      };

      function rubberBandDistance(d, dimension, constant) {
        const abs = Math.abs(d);
        if (dimension <= 0) return 0;
        const result = (constant * abs * dimension) / (dimension + constant * abs);
        return Math.sign(d) * result;
      }

      (function attachRubberBand() {
        const listEl = document.getElementById("dappList");
        if (!listEl) return;

        let startY = 0;
        let activePointerId = null;
        let dragging = false;
        let moved = false;

        function apply(offset) {
          const t = offset;
          if (RUBBER_BAND.enableScaleY) {
            const s = 1 + Math.abs(offset) / RUBBER_BAND.scaleDivisor;
            listEl.style.transform = `translateY(${t}px) scaleY(${s})`;
          } else {
            listEl.style.transform = `translateY(${t}px)`;
          }
        }

        function reset() {
          listEl.style.transition = `transform ${RUBBER_BAND.snapMs}ms ${RUBBER_BAND.snapEasing}`;
          listEl.style.transform = "";
          window.setTimeout(() => {
            listEl.style.transition = "";
          }, RUBBER_BAND.snapMs + 40);
        }

        let downTarget = null;
        let pressedLi = null;

        listEl.addEventListener("pointerdown", (e) => {
          if (e.button != null && e.button !== 0) return;
          activePointerId = e.pointerId;
          startY = e.clientY;
          dragging = true;
          moved = false;
          downTarget = e.target;
          listEl.style.transition = "";
          try {
            listEl.setPointerCapture(activePointerId);
          } catch (_) {}

          pressedLi = e.target.closest("li");
          if (pressedLi) pressedLi.classList.add("is-pressed");
        });

        listEl.addEventListener(
          "pointermove",
          (e) => {
            if (!dragging || e.pointerId !== activePointerId) return;
            const dy = e.clientY - startY;

            if (!moved && Math.abs(dy) > RUBBER_BAND.deadzonePx) moved = true;
            const effectiveDy =
              Math.abs(dy) <= RUBBER_BAND.deadzonePx
                ? 0
                : dy - Math.sign(dy) * RUBBER_BAND.deadzonePx;

            const dim = window.innerHeight || 800;
            let offset = rubberBandDistance(
              effectiveDy,
              dim,
              RUBBER_BAND.constant
            );

            const max = RUBBER_BAND.maxPullPx;
            if (offset > max) offset = max;
            if (offset < -max) offset = -max;

            apply(offset);
          },
          { passive: false }
        );

        function end(e) {
          if (!dragging || e.pointerId !== activePointerId) return;
          dragging = false;
          activePointerId = null;

          if (pressedLi) {
            pressedLi.classList.remove("is-pressed");
            pressedLi = null;
          }

          reset();

          if (!moved && downTarget) {
            const li = downTarget.closest("li");
            const dapp = li && li.__dapp;
            if (dapp) {
              if (downTarget.closest(".launchBtn")) {
                // Tapped the Launch button → open the hosted dapp.
                launchDapp(dapp);
              } else {
                // Tapped anywhere else on the card → open the preview.
                openPreview(dapp, li);
              }
            } else {
              // Fallback for non-dapp rows (e.g. status messages with a link).
              const link = downTarget.closest("a");
              if (link && link.href) {
                window.open(link.href, link.target || "_self", "noopener");
              }
            }
          }
          downTarget = null;
        }

        listEl.addEventListener("pointerup", end);
        listEl.addEventListener("pointercancel", end);

        listEl.addEventListener(
          "click",
          (e) => {
            e.preventDefault();
            e.stopPropagation();
          },
          true
        );
      })();

    </script>
  </body>
</html>
