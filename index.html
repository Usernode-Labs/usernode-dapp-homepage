<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Usernode dapps</title>
    <script>
    // Apply the persisted (or system-preferred) theme before first paint to
    // avoid a flash of the wrong theme. Mirrors Tailwind's class strategy:
    // a `dark` class on <html> selects the dark CSS-variable set.
    (function () {
      try {
        var stored = localStorage.getItem('dapphome:theme');
        var dark = stored
          ? stored === 'dark'
          : window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      } catch (_) {}
    })();
    </script>
    <script>
    // usernode-dev-console@1
    (function () {
      if (window.__usernodeDevConsole) return;
      window.__usernodeDevConsole = true;
      var S = '__usernodeDevConsole';
      function serialize(v, depth) {
        depth = depth || 0;
        try {
          if (v === undefined) return 'undefined';
          if (v === null) return 'null';
          if (typeof v === 'string') return v;
          if (typeof v === 'number' || typeof v === 'boolean') return String(v);
          if (typeof v === 'function') return '[Function ' + (v.name || 'anonymous') + ']';
          if (v instanceof Error) return (v.stack || (v.name + ': ' + v.message));
          if (depth > 3) return '[…]';
          var seen = new WeakSet();
          return JSON.stringify(v, function (k, val) {
            if (typeof val === 'object' && val !== null) {
              if (seen.has(val)) return '[Circular]';
              seen.add(val);
            }
            if (typeof val === 'function') return '[Function ' + (val.name || 'anonymous') + ']';
            if (val instanceof Error) return val.stack || (val.name + ': ' + val.message);
            return val;
          });
        } catch (e) { try { return String(v); } catch (_) { return '[unserializable]'; } }
      }
      function post(level, args, meta) {
        try {
          var payload = {
            sentinel: S,
            level: level,
            args: Array.prototype.slice.call(args).map(function (a) { return serialize(a); }),
            ts: Date.now(),
            url: location.href,
          };
          if (meta) for (var k in meta) payload[k] = meta[k];
          if (window.parent && window.parent !== window) {
            window.parent.postMessage(payload, '*');
          }
        } catch (_) {}
      }
      ['log','info','warn','error','debug'].forEach(function (level) {
        var orig = console[level] ? console[level].bind(console) : function () {};
        console[level] = function () { post(level, arguments); orig.apply(null, arguments); };
      });
      window.addEventListener('error', function (e) {
        var msg = (e.error && (e.error.stack || e.error.message)) || e.message || 'Error';
        post('error', [msg], { source: e.filename || '', line: e.lineno || 0, col: e.colno || 0, kind: 'error' });
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason;
        var msg = (r && (r.stack || r.message)) || String(r);
        post('error', [msg], { kind: 'unhandledrejection' });
      });
      try { post('info', ['[dev-console ready]'], { kind: 'ready' }); } catch (_) {}
    })();
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --fg: #0b1220;
        --muted: #4b5568;
        --card: #ffffff;
        --border: rgba(15, 23, 42, 0.12);
        --card-item-border: rgba(15, 23, 42, 0.07);
        --card-item-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        --accent: #2563eb;
        --launch-btn: #7c3aed;
        --card-hover-border: rgba(99, 102, 241, 0.45);
        --grid-opacity: 0.04;
      }
      /* Class strategy (Tailwind-style): a `dark` class on <html> selects the
         dark palette. The default theme is chosen at load time from
         localStorage, falling back to the system preference. */
      html.dark {
        color-scheme: dark;
        --bg: #0b0f16;
        --fg: #e7edf7;
        --muted: #a8b3c7;
        --card: #141b26;
        --border: rgba(255, 255, 255, 0.12);
        --card-item-border: rgba(255, 255, 255, 0.07);
        --card-item-shadow: 0 1px 6px rgba(0, 0, 0, 0.28);
        --accent: #6ea8fe;
        --launch-btn: #8b5cf6;
        --card-hover-border: rgba(139, 92, 246, 0.6);
        --grid-opacity: 0.06;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background-color: var(--bg);
        background-image:
          repeating-linear-gradient(rgba(100, 100, 120, var(--grid-opacity)) 1px, transparent 1px),
          repeating-linear-gradient(90deg, rgba(100, 100, 120, var(--grid-opacity)) 1px, transparent 1px);
        background-size: 36px 36px;
        color: var(--fg);
        height: 100vh;
        height: 100dvh;
      }
      main {
        height: 100vh;
        height: 100dvh;
        display: flex;
        justify-content: flex-start;
        align-items: stretch;
        padding: 16px;
        box-sizing: border-box;
      }
      .card {
        width: 100%;
        max-width: 820px;
        margin: 0 auto;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        height: 100%;
        min-height: 0;
      }
      .header {
        padding: 18px 18px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--card);
        flex: 0 0 auto;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .headerRow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      /* Brand lockup: Usernode logo mark + wordmark, linking back to the
         Usernode homepage, sitting left of the "Dapps" section title. Colors
         come from the shared theme variables so it recolors in light/dark. */
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .brandLink {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: inherit;
        text-decoration: none;
        flex: 0 0 auto;
      }
      .brandLink:hover .brandName {
        color: var(--accent);
      }
      .brandMark {
        width: 22px;
        height: 22px;
        display: block;
        color: var(--accent);
        flex: 0 0 auto;
      }
      .brandName {
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.2px;
        color: var(--fg);
        white-space: nowrap;
      }
      .brandSep {
        width: 1px;
        height: 18px;
        background: var(--border);
        flex: 0 0 auto;
      }
      /* On very narrow screens drop the wordmark (keep the icon) so the brand
         never pushes the theme + sort controls off the header row. */
      @media (max-width: 420px) {
        .brandName {
          display: none;
        }
      }
      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      p {
        margin: 10px 0;
        color: var(--muted);
        line-height: 1.45;
      }
      .headerActions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
      }
      .themeBtn {
        appearance: none;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        padding: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }
      .themeBtn:hover {
        color: var(--fg);
        border-color: var(--accent);
      }
      .themeBtn svg {
        width: 16px;
        height: 16px;
        display: block;
      }
      /* Show the sun in dark mode (click → go light) and the moon in light
         mode (click → go dark). */
      .themeBtn .iconSun {
        display: none;
      }
      html.dark .themeBtn .iconSun {
        display: block;
      }
      html.dark .themeBtn .iconMoon {
        display: none;
      }
      .sortWrap {
        position: relative;
        flex: 0 0 auto;
      }
      .sortBtn {
        appearance: none;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        font-size: 13px;
        padding: 6px 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
        font-family: inherit;
      }
      .sortBtn:hover {
        color: var(--fg);
        border-color: var(--accent);
      }
      .sortBtn svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }
      .sortMenu {
        display: none;
        position: absolute;
        top: calc(100% + 4px);
        right: 0;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        z-index: 100;
        min-width: 180px;
        padding: 4px;
        overflow: hidden;
      }
      .sortMenu.open {
        display: block;
      }
      .sortOpt {
        display: block;
        width: 100%;
        padding: 8px 12px;
        border: none;
        background: transparent;
        color: var(--fg);
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        border-radius: 6px;
        font-family: inherit;
      }
      .sortOpt:hover {
        background: var(--border);
      }
      .sortOpt.active {
        color: var(--accent);
        font-weight: 600;
      }
      ul {
        list-style: none;
        padding: 12px 12px 14px;
        margin: 0;
        display: grid;
        gap: 10px;
        will-change: transform;
        touch-action: none;
        flex: 1 1 auto;
        min-height: 0;
        align-content: start;
        grid-auto-rows: max-content;
      }
      li {
        border: 1px solid var(--card-item-border);
        box-shadow: var(--card-item-shadow);
        border-radius: 12px;
        padding: 0;
        overflow: hidden;
        transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
        will-change: transform;
      }
      li:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(99, 102, 241, 0.18);
        border-color: var(--card-hover-border);
      }
      li.is-pressed {
        transform: translateY(0px);
        box-shadow: none;
        border-color: var(--card-hover-border);
        transition-duration: 80ms;
      }
      .dappLink {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 12px;
        color: inherit;
        text-decoration: none;
        touch-action: none;
      }
      .dappLink:hover {
        text-decoration: none;
      }
      .dappLink:active {
        filter: brightness(0.98);
      }
      /* Per-dapp leading mark. Either a provided logo (image URL or inline
         SVG from dapps.json) or a generated fallback badge. Sized to span the
         row's text block; theme-aware via the shared CSS variables. */
      .dappBody {
        display: grid;
        gap: 4px;
        flex: 1 1 auto;
        min-width: 0;
      }
      .dappLogo,
      .dappLogoFallback {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        flex: 0 0 auto;
        border: 1px solid var(--border);
        box-sizing: border-box;
        overflow: hidden;
      }
      .dappLogo {
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
      }
      .dappLogo img,
      .dappLogo svg {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .dappLogoFallback {
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
        line-height: 1;
        color: #ffffff;
        text-transform: uppercase;
        user-select: none;
      }
      .nameRow {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0;
      }
      .name {
        font-weight: 600;
        min-width: 0;
      }
      .stats {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
        font-size: 13px;
        color: var(--muted);
      }
      .stat {
        display: flex;
        align-items: center;
        gap: 3px;
        white-space: nowrap;
      }
      .stat svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        opacity: 0.7;
      }
      .statsLoading {
        font-size: 12px;
        color: var(--muted);
        opacity: 0.5;
      }
      .author {
        color: var(--muted);
        font-size: 12px;
        opacity: 0.75;
      }
      .descRow {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }
      .desc {
        color: var(--muted);
        font-size: 13px;
        flex: 1 1 auto;
        min-width: 0;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .launchBtn {
        flex: 0 0 auto;
        font-size: 12px;
        font-weight: 600;
        font-family: inherit;
        padding: 4px 10px;
        border-radius: 6px;
        background: linear-gradient(135deg, #6d28d9, #9333ea);
        color: #ffffff;
        box-shadow: 0 0 8px rgba(124, 58, 237, 0.35);
        transition: filter 0.2s ease, box-shadow 0.2s ease;
      }
      .dappLink:hover .launchBtn {
        filter: brightness(1.15);
        box-shadow: 0 0 14px rgba(124, 58, 237, 0.55);
      }
      html.dark .launchBtn {
        background: linear-gradient(135deg, #7c3aed, #c084fc);
        box-shadow: 0 0 12px rgba(167, 139, 250, 0.55);
      }
      html.dark .dappLink:hover .launchBtn {
        filter: brightness(1.12);
        box-shadow: 0 0 18px rgba(167, 139, 250, 0.75);
      }
      .tagRow {
        display: flex;
        align-items: center;
        margin-top: 4px;
        gap: 6px;
      }
      .categoryTag {
        font-size: 11px;
        font-weight: 600;
        padding: 2px 7px;
        border-radius: 999px;
        display: inline-block;
      }
      /* --- dApp preview panel --- */
      .previewOverlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .previewOverlay.open {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }
      .previewBackdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
      }
      .previewPanel {
        position: relative;
        background: var(--card);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
        width: 100%;
        max-width: 560px;
        max-height: 88vh;
        max-height: 88dvh;
        overflow-y: auto;
        padding: 20px 18px 22px;
        box-sizing: border-box;
        box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.35);
        transform: translateY(20px);
      }
      .previewOverlay.open .previewPanel {
        transform: none;
      }
      @media (min-width: 560px) {
        .previewOverlay {
          align-items: center;
        }
        .previewPanel {
          border-radius: 16px;
        }
      }
      @media (prefers-reduced-motion: no-preference) {
        .previewOverlay {
          transition: opacity 0.2s ease, visibility 0.2s ease;
        }
        .previewPanel {
          transition: transform 0.26s cubic-bezier(0.2, 0.9, 0.2, 1);
        }
      }
      .previewClose {
        position: absolute;
        top: 12px;
        right: 12px;
        appearance: none;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        width: 30px;
        height: 30px;
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: inherit;
      }
      .previewClose:hover {
        color: var(--fg);
        border-color: var(--accent);
      }
      .previewHeader {
        display: flex;
        align-items: center;
        gap: 12px;
        padding-right: 36px;
      }
      .previewHeader .dappLogo,
      .previewHeader .dappLogoFallback {
        width: 48px;
        height: 48px;
      }
      .previewHeaderText {
        min-width: 0;
      }
      .previewTitle {
        margin: 0;
        font-size: 19px;
        font-weight: 700;
      }
      .previewTagRow {
        margin-top: 6px;
        display: flex;
        gap: 6px;
      }
      .previewMeta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
        margin-top: 14px;
        font-size: 13px;
        color: var(--muted);
      }
      .previewMetaItem {
        white-space: nowrap;
      }
      .previewMetaItem a {
        color: var(--accent);
        text-decoration: none;
      }
      .previewMetaItem a:hover {
        text-decoration: underline;
      }
      .previewShots {
        display: flex;
        gap: 10px;
        margin-top: 16px;
        overflow-x: auto;
        padding-bottom: 4px;
        -webkit-overflow-scrolling: touch;
      }
      .previewShot {
        flex: 0 0 auto;
        width: 240px;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid var(--border);
        background: var(--bg);
      }
      .previewShot img,
      .previewShot svg {
        display: block;
        width: 100%;
        height: auto;
      }
      .previewDesc {
        margin: 16px 0 18px;
        color: var(--fg);
        font-size: 14px;
        line-height: 1.55;
        white-space: pre-line;
      }
      .previewActions {
        display: flex;
        justify-content: flex-end;
      }
      .previewLaunch {
        appearance: none;
        border: none;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        padding: 9px 20px;
        border-radius: 8px;
        cursor: pointer;
        color: #ffffff;
        background: linear-gradient(135deg, #6d28d9, #9333ea);
        box-shadow: 0 0 10px rgba(124, 58, 237, 0.4);
        transition: filter 0.2s ease, box-shadow 0.2s ease;
      }
      .previewLaunch:hover {
        filter: brightness(1.12);
        box-shadow: 0 0 16px rgba(124, 58, 237, 0.6);
      }
      html.dark .previewLaunch {
        background: linear-gradient(135deg, #7c3aed, #c084fc);
        box-shadow: 0 0 12px rgba(167, 139, 250, 0.55);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="header">
          <div class="headerRow">
            <div class="brand">
              <a class="brandLink" href="https://usernode.evanshapiro.dev" target="_blank" rel="noopener" aria-label="Usernode home">
                <svg class="brandMark" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <rect x="2" y="2" width="20" height="20" rx="6" fill="currentColor" />
                  <path d="M8 7v5.2a4 4 0 0 0 8 0V7" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" />
                </svg>
                <span class="brandName">DAPPS</span>
              </a>
            </div>
            <div class="headerActions">
            <button class="themeBtn" id="themeBtn" type="button" aria-label="Toggle theme" title="Toggle theme">
              <svg class="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              <svg class="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            </button>
            <div class="sortWrap">
              <button class="sortBtn" id="sortBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M6 12h12M9 18h6"/></svg>
                <span id="sortLabel">Popular</span>
              </button>
              <div class="sortMenu" id="sortMenu">
                <button class="sortOpt" data-sort="popular">Popular</button>
                <button class="sortOpt" data-sort="users">Most users</button>
                <button class="sortOpt" data-sort="txns">Most transactions</button>
                <button class="sortOpt" data-sort="alpha">Alphabetical</button>
              </div>
            </div>
            </div>
          </div>
        </div>
        <ul id="dappList"></ul>
      </div>
    </main>

    <!-- dApp preview panel: opened by tapping a card body; lives outside
         #dappList so the list's capture-phase click blocker and rubber-band
         pointer handlers never intercept its controls. -->
    <div class="previewOverlay" id="previewOverlay" aria-hidden="true">
      <div class="previewBackdrop" id="previewBackdrop"></div>
      <div
        class="previewPanel"
        id="previewPanel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="previewTitle"
      >
        <button class="previewClose" id="previewClose" type="button" aria-label="Close preview">✕</button>
        <div class="previewHeader">
          <div class="previewLogo" id="previewLogo"></div>
          <div class="previewHeaderText">
            <h2 class="previewTitle" id="previewTitle"></h2>
            <div class="previewTagRow" id="previewTagRow"></div>
          </div>
        </div>
        <div class="previewMeta" id="previewMeta"></div>
        <div class="previewShots" id="previewShots"></div>
        <p class="previewDesc" id="previewDesc"></p>
        <div class="previewActions">
          <button class="previewLaunch" id="previewLaunch" type="button">Launch</button>
        </div>
      </div>
    </div>

    <script>
      const SORT_KEY = "dapphome:sort";
      const THEME_KEY = "dapphome:theme";
      const PERSON_WEIGHT = 20;
      const CATEGORY_COLORS = {
        Game:    '#10b981',
        Market:  '#f59e0b',
        Utility: '#38bdf8',
        Social:  '#f43f5e',
      };

      const list = document.getElementById("dappList");
      const sortBtn = document.getElementById("sortBtn");
      const sortMenu = document.getElementById("sortMenu");
      const sortLabel = document.getElementById("sortLabel");
      const themeBtn = document.getElementById("themeBtn");

      // Theme toggle. The initial class is applied pre-paint in <head>; here we
      // just flip it and persist the explicit choice to localStorage.
      function applyTheme(theme) {
        document.documentElement.classList.toggle("dark", theme === "dark");
        if (themeBtn) {
          const isDark = theme === "dark";
          themeBtn.setAttribute(
            "aria-label",
            isDark ? "Switch to light theme" : "Switch to dark theme"
          );
          themeBtn.setAttribute("title", themeBtn.getAttribute("aria-label"));
        }
      }
      applyTheme(
        document.documentElement.classList.contains("dark") ? "dark" : "light"
      );
      if (themeBtn) {
        themeBtn.addEventListener("click", () => {
          const next = document.documentElement.classList.contains("dark")
            ? "light"
            : "dark";
          localStorage.setItem(THEME_KEY, next);
          applyTheme(next);
        });
      }

      let allApps = [];
      let statsMap = {};
      // Element → dapp association so the centralized pointer/keyboard handlers
      // can resolve which dapp a tapped card belongs to. Rebuilt every render.
      const cardDapps = new WeakMap();
      let currentSort = localStorage.getItem(SORT_KEY) || "popular";

      const SORT_LABELS = {
        popular: "Popular",
        users: "Most users",
        txns: "Most transactions",
        alpha: "Alphabetical",
      };

      function clearList() {
        if (!list) return;
        list.textContent = "";
      }

      function addRow(text) {
        if (!list) return;
        const li = document.createElement("li");
        li.style.padding = "12px 12px";
        li.style.color = "var(--muted)";
        li.textContent = text;
        list.appendChild(li);
      }

      function personIcon() {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 24 24");
        svg.setAttribute("fill", "none");
        svg.setAttribute("stroke", "currentColor");
        svg.setAttribute("stroke-width", "2");
        svg.setAttribute("stroke-linecap", "round");
        svg.setAttribute("stroke-linejoin", "round");
        svg.innerHTML = '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>';
        return svg;
      }

      function txIcon() {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 24 24");
        svg.setAttribute("fill", "none");
        svg.setAttribute("stroke", "currentColor");
        svg.setAttribute("stroke-width", "2");
        svg.setAttribute("stroke-linecap", "round");
        svg.setAttribute("stroke-linejoin", "round");
        svg.innerHTML = '<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>';
        return svg;
      }

      // Deterministic hue from a dapp name so the same dapp always gets the
      // same fallback badge color across reloads/sorts.
      function hashString(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) {
          h = (h * 31 + str.charCodeAt(i)) | 0;
        }
        return Math.abs(h);
      }

      function fallbackColor(name) {
        const hue = hashString(name || "") % 360;
        return `hsl(${hue}, 55%, 45%)`;
      }

      function fallbackBadge(dapp) {
        const name = (dapp.name || "").trim();
        const badge = document.createElement("div");
        badge.className = "dappLogoFallback";
        badge.style.background = fallbackColor(name || "?");
        badge.textContent = (name[0] || "?").toUpperCase();
        badge.setAttribute("aria-hidden", "true");
        return badge;
      }

      // Build the row's leading mark. `dapp.logo` may be an image URL or an
      // inline-SVG string; anything else (or a broken image) falls back to a
      // generated initial badge so every row shows something.
      function makeLogo(dapp) {
        const raw = typeof dapp.logo === "string" ? dapp.logo.trim() : "";
        if (raw.startsWith("<svg")) {
          const wrap = document.createElement("div");
          wrap.className = "dappLogo";
          wrap.innerHTML = raw;
          wrap.setAttribute("aria-hidden", "true");
          return wrap;
        }
        if (raw) {
          const wrap = document.createElement("div");
          wrap.className = "dappLogo";
          const img = document.createElement("img");
          img.src = raw;
          img.alt = "";
          img.loading = "lazy";
          img.addEventListener("error", () => {
            wrap.replaceWith(fallbackBadge(dapp));
          });
          wrap.appendChild(img);
          return wrap;
        }
        return fallbackBadge(dapp);
      }

      function formatNum(n) {
        if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, "") + "M";
        if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "k";
        return String(n);
      }

      function sortApps(apps) {
        const sorted = apps.slice();
        sorted.sort((a, b) => {
          const sa = statsMap[a.pubkey] || { users: 0, txns: 0 };
          const sb = statsMap[b.pubkey] || { users: 0, txns: 0 };
          switch (currentSort) {
            case "alpha":
              return (a.name || "").localeCompare(b.name || "");
            case "users":
              return sb.users - sa.users || sb.txns - sa.txns;
            case "txns":
              return sb.txns - sa.txns || sb.users - sa.users;
            case "popular":
            default:
              return (sb.users * PERSON_WEIGHT + sb.txns) - (sa.users * PERSON_WEIGHT + sa.txns);
          }
        });
        return sorted;
      }

      function renderDapps(dapps) {
        if (!list) return;
        clearList();

        if (!Array.isArray(dapps) || dapps.length === 0) {
          addRow("(no dapps configured)");
          return;
        }

        const sorted = sortApps(dapps);

        for (const dapp of sorted) {
          const li = document.createElement("li");

          const link = document.createElement("a");
          link.className = "dappLink";
          link.href = dapp.url;
          link.target = "_blank";
          link.rel = "noopener";
          link.setAttribute("aria-haspopup", "dialog");

          const logo = makeLogo(dapp);

          const body = document.createElement("div");
          body.className = "dappBody";

          const nameRow = document.createElement("div");
          nameRow.className = "nameRow";

          // Wrap the name so space-between only separates it from the stats.
          const nameGroup = document.createElement("div");
          nameGroup.style.cssText = "display:flex;align-items:center;min-width:0;flex:1 1 auto";

          const name = document.createElement("div");
          name.className = "name";
          name.textContent = dapp.name || "(unnamed)";
          nameGroup.appendChild(name);

          nameRow.appendChild(nameGroup);

          if (dapp.pubkey) {
            const s = statsMap[dapp.pubkey];
            const statsEl = document.createElement("div");
            statsEl.className = "stats";

            if (s) {
              const userStat = document.createElement("span");
              userStat.className = "stat";
              userStat.appendChild(personIcon());
              userStat.appendChild(document.createTextNode(formatNum(s.users)));

              const txStat = document.createElement("span");
              txStat.className = "stat";
              txStat.appendChild(txIcon());
              txStat.appendChild(document.createTextNode(formatNum(s.txns)));

              statsEl.appendChild(userStat);
              statsEl.appendChild(txStat);
            } else {
              const loading = document.createElement("span");
              loading.className = "statsLoading";
              loading.textContent = "loading...";
              statsEl.appendChild(loading);
            }

            nameRow.appendChild(statsEl);
          }

          const author = document.createElement("div");
          author.className = "author";
          author.textContent = `by ${dapp.author || "unknown"}`;

          let tagRow = null;
          if (dapp.category) {
            tagRow = document.createElement("div");
            tagRow.className = "tagRow";
            const tag = document.createElement("span");
            tag.className = "categoryTag";
            tag.textContent = dapp.category;
            const color = CATEGORY_COLORS[dapp.category];
            if (color) {
              tag.style.color = color;
              tag.style.background = color + "33";
              tag.style.border = "1px solid " + color + "66";
            } else {
              tag.style.color = "var(--muted)";
              tag.style.border = "1px solid var(--border)";
            }
            tagRow.appendChild(tag);
          }

          const descRow = document.createElement("div");
          descRow.className = "descRow";

          const desc = document.createElement("span");
          desc.className = "desc";
          desc.textContent = dapp.description || "";

          const launchBtn = document.createElement("span");
          launchBtn.className = "launchBtn";
          launchBtn.textContent = "Launch";
          launchBtn.setAttribute("role", "button");
          launchBtn.setAttribute("tabindex", "0");
          launchBtn.setAttribute("aria-label", `Launch ${dapp.name || "dapp"}`);

          descRow.appendChild(desc);
          descRow.appendChild(launchBtn);

          body.appendChild(nameRow);
          body.appendChild(author);
          if (tagRow) body.appendChild(tagRow);
          body.appendChild(descRow);

          link.appendChild(logo);
          link.appendChild(body);
          li.appendChild(link);
          cardDapps.set(li, dapp);
          list.appendChild(li);
        }
      }

      // --- Preview panel ---
      const previewOverlay = document.getElementById("previewOverlay");
      const previewPanel = document.getElementById("previewPanel");
      const previewClose = document.getElementById("previewClose");
      const previewLaunch = document.getElementById("previewLaunch");
      const previewLogo = document.getElementById("previewLogo");
      const previewTitle = document.getElementById("previewTitle");
      const previewTagRow = document.getElementById("previewTagRow");
      const previewMeta = document.getElementById("previewMeta");
      const previewShots = document.getElementById("previewShots");
      const previewDesc = document.getElementById("previewDesc");

      let previewDapp = null;
      let previewLastFocus = null;

      function launchDapp(dapp) {
        if (dapp && dapp.url) window.open(dapp.url, "_blank", "noopener");
      }

      // Parse an ISO-ish date string to a human label. Falls back to the raw
      // string if it isn't a valid date (never shows "Invalid Date").
      function formatDate(value) {
        if (typeof value !== "string" || !value.trim()) return "";
        const raw = value.trim();
        const iso = /[T ]/.test(raw) ? raw : raw + "T00:00:00";
        const d = new Date(iso);
        if (isNaN(d.getTime())) return raw;
        try {
          return d.toLocaleDateString(undefined, {
            year: "numeric",
            month: "short",
            day: "numeric",
          });
        } catch (_) {
          return raw;
        }
      }

      function categoryBadge(category) {
        const tag = document.createElement("span");
        tag.className = "categoryTag";
        tag.textContent = category;
        const color = CATEGORY_COLORS[category];
        if (color) {
          tag.style.color = color;
          tag.style.background = color + "33";
          tag.style.border = "1px solid " + color + "66";
        } else {
          tag.style.color = "var(--muted)";
          tag.style.border = "1px solid var(--border)";
        }
        return tag;
      }

      // Build one screenshot cell. Inline-SVG strings (trusted dapps.json)
      // render via innerHTML, mirroring makeLogo(); anything else is treated as
      // an image URL that removes itself (and hides the empty strip) on error.
      function makeShot(src) {
        const raw = typeof src === "string" ? src.trim() : "";
        if (!raw) return null;
        const cell = document.createElement("div");
        cell.className = "previewShot";
        if (raw.startsWith("<svg")) {
          cell.innerHTML = raw;
          cell.setAttribute("aria-hidden", "true");
          return cell;
        }
        const img = document.createElement("img");
        img.src = raw;
        img.alt = "";
        img.loading = "lazy";
        img.addEventListener("error", () => {
          cell.remove();
          if (!previewShots.children.length) previewShots.style.display = "none";
        });
        cell.appendChild(img);
        return cell;
      }

      function metaItem(text) {
        const span = document.createElement("span");
        span.className = "previewMetaItem";
        span.textContent = text;
        return span;
      }

      function renderPreview(dapp) {
        previewLogo.textContent = "";
        previewLogo.appendChild(makeLogo(dapp));
        previewTitle.textContent = dapp.name || "(unnamed)";

        previewTagRow.textContent = "";
        if (dapp.category) previewTagRow.appendChild(categoryBadge(dapp.category));

        // Meta row: developer/author, version, last update, live stats.
        previewMeta.textContent = "";
        const devName = (dapp.developer && dapp.developer.name) || dapp.author;
        if (devName) {
          const devUrl = dapp.developer && dapp.developer.url;
          if (devUrl) {
            const item = document.createElement("span");
            item.className = "previewMetaItem";
            item.appendChild(document.createTextNode("by "));
            const a = document.createElement("a");
            a.href = devUrl;
            a.target = "_blank";
            a.rel = "noopener";
            a.textContent = devName;
            item.appendChild(a);
            previewMeta.appendChild(item);
          } else {
            previewMeta.appendChild(metaItem("by " + devName));
          }
        }
        if (dapp.version) previewMeta.appendChild(metaItem("v" + dapp.version));
        const updated = formatDate(dapp.lastUpdated);
        if (updated) previewMeta.appendChild(metaItem("Updated " + updated));
        const s = dapp.pubkey ? statsMap[dapp.pubkey] : null;
        if (s) {
          previewMeta.appendChild(metaItem(formatNum(s.users) + " users"));
          previewMeta.appendChild(metaItem(formatNum(s.txns) + " txns"));
        }

        // Screenshots (optional).
        previewShots.textContent = "";
        previewShots.style.display = "";
        const shots = Array.isArray(dapp.screenshots) ? dapp.screenshots : [];
        let added = 0;
        for (const src of shots) {
          const node = makeShot(src);
          if (node) {
            previewShots.appendChild(node);
            added++;
          }
        }
        if (!added) previewShots.style.display = "none";

        // Long description, plain text (falls back to the short description).
        previewDesc.textContent = dapp.longDescription || dapp.description || "";
      }

      function focusableInPanel() {
        return Array.from(
          previewPanel.querySelectorAll(
            'a[href], button:not([disabled]), [tabindex]:not([tabindex="-1"])'
          )
        ).filter((el) => el.offsetParent !== null);
      }

      function openPreview(dapp) {
        if (!dapp) return;
        previewDapp = dapp;
        renderPreview(dapp);
        previewLastFocus =
          document.activeElement && document.activeElement.focus
            ? document.activeElement
            : null;
        previewOverlay.classList.add("open");
        previewOverlay.setAttribute("aria-hidden", "false");
        previewPanel.scrollTop = 0;
        previewClose.focus();
      }

      function closePreview() {
        if (!previewOverlay.classList.contains("open")) return;
        previewOverlay.classList.remove("open");
        previewOverlay.setAttribute("aria-hidden", "true");
        previewDapp = null;
        if (previewLastFocus && previewLastFocus.focus) {
          try {
            previewLastFocus.focus();
          } catch (_) {}
        }
        previewLastFocus = null;
      }

      previewClose.addEventListener("click", closePreview);
      previewOverlay
        .querySelector("#previewBackdrop")
        .addEventListener("click", closePreview);
      previewLaunch.addEventListener("click", () => {
        if (previewDapp) launchDapp(previewDapp);
      });

      document.addEventListener("keydown", (e) => {
        if (!previewOverlay.classList.contains("open")) return;
        if (e.key === "Escape") {
          e.preventDefault();
          closePreview();
          return;
        }
        if (e.key === "Tab") {
          const items = focusableInPanel();
          if (!items.length) return;
          const first = items[0];
          const last = items[items.length - 1];
          if (e.shiftKey && document.activeElement === first) {
            e.preventDefault();
            last.focus();
          } else if (!e.shiftKey && document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
      });

      // Keyboard activation for cards: Enter/Space on a focused card opens its
      // preview; on the Launch control it launches. Mirrors the pointer split
      // below. (Mouse/touch clicks are blocked by the list's capture handler
      // and routed through the rubber-band end() handler instead.)
      if (list) {
        list.addEventListener("keydown", (e) => {
          if (e.key !== "Enter" && e.key !== " " && e.key !== "Spacebar") return;
          const li = e.target.closest("li");
          if (!li) return;
          const dapp = cardDapps.get(li);
          if (!dapp) return;
          e.preventDefault();
          if (e.target.closest(".launchBtn")) launchDapp(dapp);
          else openPreview(dapp);
        });
      }

      async function loadDappsJson() {
        const resp = await fetch("./dapps.json", { cache: "no-store" });
        if (!resp.ok) {
          throw new Error(`Failed to load dapps.json: HTTP ${resp.status}`);
        }
        return await resp.json();
      }

      async function loadAllStats(apps) {
        try {
          const resp = await fetch("/api/stats");
          if (!resp.ok) throw new Error(`Stats API ${resp.status}`);
          const data = await resp.json();
          for (const [pk, s] of Object.entries(data)) {
            statsMap[pk] = s;
          }
          renderDapps(allApps);
        } catch (e) {
          console.warn("Could not load stats:", e);
        }
      }

      // --- Sort menu ---
      function updateSortUI() {
        sortLabel.textContent = SORT_LABELS[currentSort] || "Popular";
        sortMenu.querySelectorAll(".sortOpt").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.sort === currentSort);
        });
      }

      sortBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        sortMenu.classList.toggle("open");
      });

      sortMenu.addEventListener("click", (e) => {
        const opt = e.target.closest(".sortOpt");
        if (!opt) return;
        currentSort = opt.dataset.sort;
        localStorage.setItem(SORT_KEY, currentSort);
        updateSortUI();
        renderDapps(allApps);
        sortMenu.classList.remove("open");
      });

      document.addEventListener("click", () => {
        sortMenu.classList.remove("open");
      });

      updateSortUI();

      (async function main() {
        addRow("(loading dapps...)");
        try {
          const json = await loadDappsJson();
          allApps = Array.isArray(json) ? json : json.apps || json.items || [];
          renderDapps(allApps);
          loadAllStats(allApps);
        } catch (e) {
          clearList();
          addRow(
            `(error loading dapps.json: ${e && e.message ? e.message : String(e)})`
          );
        }
      })();

      // --- Rubber-band (overscroll-like) stretch config ---
      const RUBBER_BAND = {
        deadzonePx: 6,
        maxPullPx: 92,
        constant: 0.56,
        snapMs: 210,
        snapEasing: "cubic-bezier(0.2, 0.9, 0.2, 1)",
        enableScaleY: true,
        scaleDivisor: 850,
      };

      function rubberBandDistance(d, dimension, constant) {
        const abs = Math.abs(d);
        if (dimension <= 0) return 0;
        const result = (constant * abs * dimension) / (dimension + constant * abs);
        return Math.sign(d) * result;
      }

      (function attachRubberBand() {
        const listEl = document.getElementById("dappList");
        if (!listEl) return;

        let startY = 0;
        let activePointerId = null;
        let dragging = false;
        let moved = false;

        function apply(offset) {
          const t = offset;
          if (RUBBER_BAND.enableScaleY) {
            const s = 1 + Math.abs(offset) / RUBBER_BAND.scaleDivisor;
            listEl.style.transform = `translateY(${t}px) scaleY(${s})`;
          } else {
            listEl.style.transform = `translateY(${t}px)`;
          }
        }

        function reset() {
          listEl.style.transition = `transform ${RUBBER_BAND.snapMs}ms ${RUBBER_BAND.snapEasing}`;
          listEl.style.transform = "";
          window.setTimeout(() => {
            listEl.style.transition = "";
          }, RUBBER_BAND.snapMs + 40);
        }

        let downTarget = null;
        let pressedLi = null;

        listEl.addEventListener("pointerdown", (e) => {
          if (e.button != null && e.button !== 0) return;
          activePointerId = e.pointerId;
          startY = e.clientY;
          dragging = true;
          moved = false;
          downTarget = e.target;
          listEl.style.transition = "";
          try {
            listEl.setPointerCapture(activePointerId);
          } catch (_) {}

          pressedLi = e.target.closest("li");
          if (pressedLi) pressedLi.classList.add("is-pressed");
        });

        listEl.addEventListener(
          "pointermove",
          (e) => {
            if (!dragging || e.pointerId !== activePointerId) return;
            const dy = e.clientY - startY;

            if (!moved && Math.abs(dy) > RUBBER_BAND.deadzonePx) moved = true;
            const effectiveDy =
              Math.abs(dy) <= RUBBER_BAND.deadzonePx
                ? 0
                : dy - Math.sign(dy) * RUBBER_BAND.deadzonePx;

            const dim = window.innerHeight || 800;
            let offset = rubberBandDistance(
              effectiveDy,
              dim,
              RUBBER_BAND.constant
            );

            const max = RUBBER_BAND.maxPullPx;
            if (offset > max) offset = max;
            if (offset < -max) offset = -max;

            apply(offset);
          },
          { passive: false }
        );

        function end(e) {
          if (!dragging || e.pointerId !== activePointerId) return;
          dragging = false;
          activePointerId = null;

          if (pressedLi) {
            pressedLi.classList.remove("is-pressed");
            pressedLi = null;
          }

          reset();

          if (!moved && downTarget) {
            // Split the tap: the Launch control navigates out; tapping
            // anywhere else on the card opens the preview panel. Resolve the
            // dapp from the card element, not from link.href, since both
            // actions now originate inside the same card.
            const li = downTarget.closest("li");
            const dapp = li ? cardDapps.get(li) : null;
            if (dapp) {
              if (downTarget.closest(".launchBtn")) {
                launchDapp(dapp);
              } else {
                openPreview(dapp);
              }
            }
          }
          downTarget = null;
        }

        listEl.addEventListener("pointerup", end);
        listEl.addEventListener("pointercancel", end);

        listEl.addEventListener(
          "click",
          (e) => {
            e.preventDefault();
            e.stopPropagation();
          },
          true
        );
      })();

    </script>
  </body>
</html>
